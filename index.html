<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Matt Sessa</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap"
      rel="stylesheet"
    />
    <link
      rel="icon"
      href="https://cdn.weweb.io/designs/447f75dd-cc80-4223-b6d3-174b107a1d5f/sections/Icon.svg?_wwcv=1718896805964"
      type="image/x-icon"
    />
    <style>
      body {
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        margin: 0;
        font-family: "Poppins", sans-serif;
        background-color: #fafafa;
      }
      .container {
        text-align: center;
        background-color: #ffffff;
        width: 300px;
        padding: 20px;
        border-radius: 8px;
        border: 12px solid #ffffff;
        box-shadow: 4px 10px 15px 2px #00000040;
      }
      .name-section {
        text-align: center;
      }
      .links-section,
      .companies-section {
        text-align: left;
      }
      .social-media-links {
        display: flex;
        gap: 20px;
        justify-content: center;
      }
      h1 {
        margin-bottom: 20px;
      }
      a {
        display: block;
        margin: 10px 0;
        color: #007bff;
        text-decoration: none;
      }
      a:hover {
        text-decoration: none;
      }
      .link-box {
        display: flex;
        justify-content: center; /* Center horizontally */
        align-items: center; /* Center vertically */
        padding: 10px;
        border: 2px solid #007bff;
        border-radius: 8px;
        background-color: #f0f8ff;
        /* box-shadow: 2px 4px 8px rgba(0, 0, 0, 0.1); */
        transition: transform 0.2s;
        text-align: center; /* Center text */
      }
      .link-box:hover {
        transform: scale(1.05);
        box-shadow: 4px 10px 15px 2px #00000040;
      }
      .link-box a {
        color: #007bff;
        text-decoration: none;
        font-weight: bold;
      }
    </style>
    <meta
      http-equiv="Cache-Control"
      content="no-cache, no-store, must-revalidate"
    />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />
  </head>
  <body>
    <div class="container">
      <div class="name-section">
        <h1>Matt Sessa</h1>
      </div>
      <div class="links-section">
        <div class="social-media-links">
          <a href="https://www.instagram.com/matt_sessa" target="_blank">
            <img
              src="https://cdn-icons-png.flaticon.com/512/174/174855.png"
              alt="Instagram Logo"
              width="32"
            />
          </a>
          <a href="https://www.x.com/matthewsessa" target="_blank">
            <img
              src="https://about.x.com/content/dam/about-twitter/x/brand-toolkit/logo-black.png"
              alt="X Logo"
              width="30"
            />
          </a>
          <a
            href="https://www.linkedin.com/in/matt-sessa-063920a3"
            target="_blank"
          >
            <img
              src="https://cdn-icons-png.flaticon.com/512/174/174857.png"
              alt="LinkedIn Logo"
              width="32"
            />
          </a>
        </div>
      </div>
      <div class="companies-section">
        <h3 style="text-align: center">Some companies I'm building</h3>
        <a href="https://www.hormonemd.com" target="_blank">
          <div class="link-box">HormoneMD</div>
        </a>
        <a href="https://www.ketaminamd.com" target="_blank">
          <div class="link-box">KetaminaMD</div>
        </a>
        <a href="https://app.mdportal.org/mdportal/" target="_blank">
          <div class="link-box">MDPortal</div>
        </a>
      </div>
    </div>
    <!-- Add the footer below the container -->
    <footer
      style="position: absolute; bottom: 10px; width: 100%; text-align: center"
    >
      &copy; 2024 Matt Sessa
    </footer>
  </body>
</html>
